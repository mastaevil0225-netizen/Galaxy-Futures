<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PDF Library</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@300;400;500&family=Noto+Serif+TC:wght@300;400&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0f0e;
    --surface: #141714;
    --surface2: #1c201b;
    --border: #2a2e29;
    --text: #e8ebe6;
    --muted: #6b7568;
    --accent: #7eb87a;
    --accent2: #4a8c46;
    --warm: #c8a96e;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Serif TC', serif;
    min-height: 100vh;
    background-image:
      radial-gradient(ellipse 80% 50% at 50% -20%, rgba(126,184,122,0.08) 0%, transparent 60%);
  }

  header {
    padding: 3rem 4rem 2rem;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
  }

  .site-title {
    font-family: 'DM Serif Display', serif;
    font-size: 2.8rem;
    font-style: italic;
    color: var(--text);
    line-height: 1;
    letter-spacing: -0.02em;
  }

  .site-title em {
    color: var(--accent);
    font-style: normal;
  }

  .site-sub {
    font-family: 'DM Mono', monospace;
    font-size: 0.68rem;
    color: var(--muted);
    letter-spacing: 0.15em;
    text-transform: uppercase;
    margin-top: 0.5rem;
  }

  .header-right {
    font-family: 'DM Mono', monospace;
    font-size: 0.68rem;
    color: var(--muted);
    text-align: right;
  }

  .header-right span {
    display: block;
    color: var(--accent);
    font-size: 1.4rem;
    font-weight: 500;
    line-height: 1.2;
  }

  main {
    max-width: 1100px;
    margin: 0 auto;
    padding: 3rem 4rem;
  }

  /* Search */
  .search-bar {
    display: flex;
    align-items: center;
    gap: 1rem;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 3px;
    padding: 0.8rem 1.2rem;
    margin-bottom: 2.5rem;
    transition: border-color 0.2s;
  }

  .search-bar:focus-within { border-color: var(--accent); }

  .search-bar input {
    flex: 1;
    background: none;
    border: none;
    outline: none;
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 0.82rem;
    letter-spacing: 0.03em;
  }

  .search-bar input::placeholder { color: var(--muted); }

  .search-icon { color: var(--muted); font-size: 1rem; }

  /* PDF Grid */
  .pdf-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 1px;
    background: var(--border);
    border: 1px solid var(--border);
    border-radius: 3px;
    overflow: hidden;
  }

  .pdf-card {
    background: var(--surface);
    padding: 1.8rem;
    display: flex;
    flex-direction: column;
    gap: 1rem;
    transition: background 0.2s;
    text-decoration: none;
    color: inherit;
  }

  .pdf-card:hover { background: var(--surface2); }

  .card-top {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 1rem;
  }

  .pdf-thumb {
    width: 3rem;
    height: 3.8rem;
    background: linear-gradient(135deg, var(--accent2), var(--accent));
    border-radius: 2px 6px 2px 2px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    position: relative;
    overflow: hidden;
  }

  .pdf-thumb::before {
    content: '';
    position: absolute;
    top: 0; right: 0;
    width: 0.7rem; height: 0.7rem;
    background: rgba(0,0,0,0.2);
    clip-path: polygon(100% 0, 0 0, 100% 100%);
  }

  .pdf-thumb span {
    font-family: 'DM Mono', monospace;
    font-size: 0.5rem;
    font-weight: 500;
    color: rgba(0,0,0,0.6);
    letter-spacing: 0.05em;
  }

  .card-num {
    font-family: 'DM Mono', monospace;
    font-size: 0.62rem;
    color: var(--muted);
    letter-spacing: 0.1em;
  }

  .card-title {
    font-size: 0.95rem;
    font-weight: 400;
    line-height: 1.5;
    color: var(--text);
    flex: 1;
  }

  .card-meta {
    font-family: 'DM Mono', monospace;
    font-size: 0.62rem;
    color: var(--muted);
    display: flex;
    justify-content: space-between;
    padding-top: 0.8rem;
    border-top: 1px solid var(--border);
  }

  .card-meta .open-link {
    color: var(--accent);
    text-decoration: none;
    transition: opacity 0.15s;
  }

  .card-meta .open-link:hover { opacity: 0.7; }

  /* Empty */
  .empty {
    grid-column: 1/-1;
    padding: 5rem;
    text-align: center;
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    font-size: 0.78rem;
    letter-spacing: 0.1em;
  }

  footer {
    text-align: center;
    padding: 3rem;
    font-family: 'DM Mono', monospace;
    font-size: 0.62rem;
    color: var(--muted);
    letter-spacing: 0.1em;
    border-top: 1px solid var(--border);
    margin-top: 4rem;
  }

  @keyframes fadeUp {
    from { opacity:0; transform:translateY(12px); }
    to { opacity:1; transform:translateY(0); }
  }

  .pdf-card { animation: fadeUp 0.4s ease both; }
  .pdf-card:nth-child(1) { animation-delay: 0.05s; }
  .pdf-card:nth-child(2) { animation-delay: 0.1s; }
  .pdf-card:nth-child(3) { animation-delay: 0.15s; }
  .pdf-card:nth-child(4) { animation-delay: 0.2s; }
  .pdf-card:nth-child(5) { animation-delay: 0.25s; }
  .pdf-card:nth-child(6) { animation-delay: 0.3s; }
</style>
</head>
<body>

<header>
  <div>
    <div class="site-title">PDF <em>Library</em></div>
    <div class="site-sub">文件储存库 · 公开索引</div>
  </div>
  <div class="header-right">
    <span id="total-count">—</span>
    份文件已托管
  </div>
</header>

<main>
  <div class="search-bar">
    <span class="search-icon">⌕</span>
    <input type="text" id="search" placeholder="搜索文件名称..." oninput="filterFiles()">
  </div>

  <div class="pdf-grid" id="pdf-grid">
    <div class="empty">正在载入文件列表…</div>
  </div>
</main>

<footer>
  此页面由 GitHub Pages 托管 · 所有文件均可通过直链访问
</footer>

<script>
  // ============================================================
  // 文件列表 — 由本地管理工具自动生成，也可手动编辑
  // 格式: { name, file, date, size }
  // ============================================================
  const FILES = [
    // 范例（部署后请删除或替换）
    // { name: "研究报告 2024", file: "pdfs/research-2024.pdf", date: "2024.03.01", size: "2.4 MB" },
  ];
  // ============================================================

  let filtered = [...FILES];

  function render(list) {
    const grid = document.getElementById('pdf-grid');
    document.getElementById('total-count').textContent = FILES.length;

    if (list.length === 0) {
      grid.innerHTML = `<div class="empty">没有找到符合条件的文件</div>`;
      return;
    }

    grid.innerHTML = list.map((f, i) => `
      <a class="pdf-card" href="${f.file}" target="_blank">
        <div class="card-top">
          <div class="pdf-thumb"><span>PDF</span></div>
          <div class="card-num">#${String(FILES.indexOf(f)+1).padStart(3,'0')}</div>
        </div>
        <div class="card-title">${f.name}</div>
        <div class="card-meta">
          <span>${f.date} · ${f.size}</span>
          <span class="open-link">开启 →</span>
        </div>
      </a>
    `).join('');
  }

  function filterFiles() {
    const q = document.getElementById('search').value.toLowerCase();
    filtered = FILES.filter(f => f.name.toLowerCase().includes(q));
    render(filtered);
  }

  render(FILES);
</script>
</body>
</html>
